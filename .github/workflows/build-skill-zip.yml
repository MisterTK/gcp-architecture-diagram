name: Build Skill ZIP

on:
  push:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          cd skills
          zip -r ../gcp-architecture-diagram.zip gcp-architecture-diagram/

      # On push to main: keep a rolling "latest" pre-release always up to date.
      # Users download this ZIP directly from the Releases page — no artifact
      # wrapper, so Claude Desktop can import it without "nested zip" errors.
      - name: Update rolling latest release
        if: github.event_name == 'push'
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --prerelease \
            --title "Latest (auto-built)" \
            --notes "Auto-built from the latest commit on \`main\`. Download \`gcp-architecture-diagram.zip\` and upload to Claude Desktop via **Customize → Skills → Add Skill**." \
            gcp-architecture-diagram.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On a tagged release: attach ZIP to that release too.
      - name: Attach to tagged release
        if: github.event_name == 'release'
        run: gh release upload ${{ github.ref_name }} gcp-architecture-diagram.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
