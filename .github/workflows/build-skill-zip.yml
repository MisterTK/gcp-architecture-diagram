name: Build Skill ZIP

on:
  push:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          cd skills
          zip -r ../gcp-architecture-diagram.zip gcp-architecture-diagram/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcp-architecture-diagram
          path: gcp-architecture-diagram.zip
          retention-days: 90

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        run: gh release upload ${{ github.ref_name }} gcp-architecture-diagram.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
